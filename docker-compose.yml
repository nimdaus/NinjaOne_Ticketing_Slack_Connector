services:
  form-bot:
    build: .
    image: form-bot:latest
    container_name: form-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # ── Slack tokens can also be set here to override the web UI ──────────
      # SLACK_BOT_TOKEN: xoxb-your-bot-token
      # SLACK_APP_TOKEN: xapp-your-app-level-token

      # ── Runtime constants — do not change ─────────────────────────────────
      PYTHONUNBUFFERED: "1"
      LOG_FILE: /app/logs/bot.log
      DB_PATH: /app/data/submissions.db

    volumes:
      # Persist rotating log files and the Docker healthcheck marker
      - ./logs:/app/logs
      # Persist form registry across container restarts
      - ./form_registry.json:/app/form_registry.json
      # Persist submissions database across container restarts
      - ./data:/app/data

    ports:
      # Bind to localhost only for direct access or SSH tunnel.
      # For Cloudflare Tunnel (sidecar container): remove this mapping and
      # point the tunnel at form-bot:8080 within the Docker network instead.
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; age = time.time() - os.path.getmtime('/app/logs/healthy'); exit(0 if age < 120 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
