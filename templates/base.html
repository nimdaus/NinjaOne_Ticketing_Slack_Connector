<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Eng Assist Admin{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: .02em; }
    header .sep { opacity: .3; }
    header .sub { opacity: .6; font-size: .85rem; }

    /* ── Layout ── */
    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      padding: 1.5rem;
    }

    /* ── Page heading row ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .page-header h2 { font-size: 1rem; font-weight: 600; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .45rem .9rem;
      border-radius: 5px;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary   { background: #4f46e5; color: #fff; }
    .btn-secondary { background: #fff; color: #374151; border-color: #d1d5db; }
    .btn-danger    { background: #ef4444; color: #fff; }
    .btn-sm { padding: .3rem .65rem; font-size: .8rem; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #6b7280;
      padding: .5rem .75rem;
      border-bottom: 1px solid #e5e7eb;
    }
    tbody tr { border-bottom: 1px solid #f3f4f6; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: .65rem .75rem; vertical-align: middle; }
    .mono { font-family: "SF Mono", "Fira Code", monospace; font-size: .82rem; }
    .muted { color: #9ca3af; font-style: italic; }
    .actions { display: flex; gap: .4rem; }

    /* ── Form ── */
    .form-grid { display: grid; gap: 1.1rem; }
    .form-group { display: flex; flex-direction: column; gap: .35rem; }
    label { font-size: .82rem; font-weight: 500; color: #374151; }
    label .hint { font-weight: 400; color: #9ca3af; margin-left: .3rem; }
    input[type=text], select {
      padding: .5rem .7rem;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: .9rem;
      font-family: inherit;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    input[type=text]:focus, select:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    input[readonly] { background: #f9fafb; color: #6b7280; cursor: default; }
    .form-actions {
      display: flex;
      gap: .6rem;
      padding-top: .5rem;
      border-top: 1px solid #f3f4f6;
      margin-top: .5rem;
    }

    /* ── Alerts ── */
    .alert {
      padding: .7rem 1rem;
      border-radius: 6px;
      font-size: .875rem;
      margin-bottom: 1rem;
    }
    .alert-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .alert-error   { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert-warning { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }
    .alert-info    { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 2.5rem 1rem; color: #9ca3af; }
    .empty p { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/" style="color:inherit;text-decoration:none;">Engineering Assistance Bot</a></h1>
    <span class="sep">|</span>
    <span class="sub">Form Admin</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
